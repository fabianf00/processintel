name: Black Format Check

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.py"
      - "pyproject.toml"

  pull_request:
    branches: [ main ]
    paths:
      - "**/*.py"
      - "pyproject.toml"

jobs:
  black:
    runs-on: node
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black
    - name: Check Code Formatting with Black
      run: |
        black --check .